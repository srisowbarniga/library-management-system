<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Issue Book Management</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
    <h1>📖 Issue Book Management</h1>
</header>

<div class="container">

    <div class="card">

        <h2>Issued Books</h2>

        <table border="1" cellpadding="10">

			<tr>
			    <th>ID</th>
			    <th>Book ID</th>
			    <th>Member ID</th>
			    <th>Issue Date</th>
			    <th>Return Date</th>
			</tr>

			<tr th:each="issue : ${issueBooks}">
			    <td th:text="${issue.borrow_id}"></td>
			    <td th:text="${issue.book_id}"></td>
			    <td th:text="${issue.member_id}"></td>
			    <td th:text="${issue.issue_date}"></td>
			    <td th:text="${issue.return_date}"></td>
			</tr>

        </table>

        <br>

        <a href="/home">⬅ Back to Dashboard</a>

    </div>

</div>

</body>
</html>
