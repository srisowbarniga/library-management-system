<!DOCTYPE html>
<html>
<head>
    <title>Library Login</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="login-body">

<div class="login-container">

    <div class="login-card">

        <h1>📚 Library Management System</h1>

        <form action="/home" method="get">

            <input type="text"
                   name="username"
                   placeholder="Username"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <h3>Login As</h3>

            <div class="role-selection">

                <label>
                    <input type="radio"
                           name="role"
                           value="admin"
                           checked>
                    Admin
                </label>

                <label>
                    <input type="radio"
                           name="role"
                           value="student">
                    Student
                </label>

            </div>

            <button type="submit">
                Login
            </button>

            <div class="forgot">
                <a href="/forgot-password">
                    Forgot Password?
                </a>
            </div>

        </form>

    </div>

</div>

</body>
</html>
