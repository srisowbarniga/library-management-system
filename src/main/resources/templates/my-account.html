<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Account</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
    <h1>👤 My Account</h1>
</header>

<div class="container">

    <div class="card">

        <h2>My Issued Books</h2>

        <table border="1" cellpadding="10">
            <tr>
                <th>Book ID</th>
                <th>Issue Date</th>
                <th>Due Date</th>
                <th>Return Date</th>
                <th>Fine (₹)</th>
            </tr>

            <tr th:each="row : ${accountData}">
                <td th:text="${row.bookId}"></td>
                <td th:text="${row.issueDate}"></td>
                <td th:text="${row.dueDate}"></td>
                <td th:text="${row.returnDate != null and !row.returnDate.isEmpty()} ? ${row.returnDate} : 'Not Returned'"></td>
                <td th:text="${row.fine > 0} ? ${row.fine} : '0'"></td>
            </tr>
        </table>

        <p style="margin-top:15px; color:#555;">
            <em>Note: Shows all issue records for now. Personalized per-student view coming once login is linked to your account.</em>
        </p>

        <br>
        <a href="/home">⬅ Back to Dashboard</a>

    </div>

</div>

</body>
</html>
